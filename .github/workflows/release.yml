name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --timeout=300 --retries=3 build twine

    - name: Build package
      run: |
        python -m build

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: tdorsey/corrupt-video-inspector
        tags: |
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64

    - name: Extract release notes from changelog
      id: changelog
      run: |
        # Extract the version from the tag
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
        # Extract release notes from changelog if it exists
        if [ -f "CHANGELOG.md" ]; then
          # Get the section for this version
          RELEASE_NOTES=$(awk -v version="$VERSION" '
            /^## \[/ {
              if ($0 ~ "\\[" version "\\]") {
                found=1; next
              } else if (found) {
                exit
              }
            }
            found && /^## \[/ { exit }
            found && !/^## \[/ { print }
          ' CHANGELOG.md | sed '/^$/d')
          
          if [ -n "$RELEASE_NOTES" ]; then
            echo "release_notes<<EOF" >> $GITHUB_OUTPUT
            echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "release_notes=Release $VERSION" >> $GITHUB_OUTPUT
          fi
        else
          echo "release_notes=Release $VERSION" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ steps.changelog.outputs.version }}
        body: ${{ steps.changelog.outputs.release_notes }}
        draft: false
        prerelease: false
        generate_release_notes: true

    - name: Upload Python package to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        twine upload dist/*
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && env.TWINE_PASSWORD != ''
