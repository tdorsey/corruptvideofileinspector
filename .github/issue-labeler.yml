# Configuration for github/issue-labeler action
# This file defines patterns to match in issue content and apply corresponding labels

# Component Labels - based on Component/Domain dropdown selection
'component:cli':
  - '*CLI*'

'component:scanner':
  - '*Scanner*'

'component:trakt':
  - '*Trakt Integration*'

'component:config':
  - '*Config*'

'component:reporter':
  - '*Reporter*'

'component:output':
  - '*Output*'

'component:docker':
  - '*Docker*'

'component:cicd':
  - '*CI/CD*'

'component:github-actions':
  - '*GitHub Actions*'

'component:tests':
  - '*Tests*'

'component:docs':
  - '*Documentation*'

'component:other':
  - '*Other*'

# Conventional Commit Type Labels - based on issue title prefixes
'type:feat':
  - '\[FEAT\]'
  - 'feature'

'type:fix':
  - '\[FIX\]'
  - 'bug'

'type:docs':
  - '\[DOCS\]'
  - 'docs'

'type:style':
  - '\[STYLE\]'
  - 'style'

'type:refactor':
  - '\[REFACTOR\]'
  - 'refactor'

'type:perf':
  - '\[PERF\]'
  - 'performance'

'type:test':
  - '\[TEST\]'
  - 'test'

'type:chore':
  - '\[CHORE\]'
  - 'chore'

'type:build':
  - '\[BUILD\]'
  - 'build'

'type:ci':
  - '\[CI\]'
  - 'ci'

'type:revert':
  - '\[REVERT\]'
  - 'revert'

# Stakeholder Labels - based on Stakeholder Type dropdown selection
'stakeholder:maintainer':
  - '*Project Maintainer*'

'stakeholder:contributor':
  - '*Contributor*'

'stakeholder:user':
  - '*End User*'